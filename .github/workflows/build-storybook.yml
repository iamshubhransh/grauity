# This workflow will build the Storybook documentation when a commit is made to the master branch

name: Build Storybook

on:
    push:
        branches: [master]

jobs:
  build-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - uses: actions/setup-node@v3
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
      - name: Build storybook docs
        run: |
          npm run build-icons
          npm run build-storybook
      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eux
          git config --global user.name 'Github Bot'
          git config --global user.email 'github-bot@users.noreply.github.com'

          mkdir -p /tmp/gh-pages
          cd /tmp/gh-pages
          git init
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git fetch origin gh-pages || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout -B gh-pages origin/gh-pages
          else
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' ! -name 'previews' -exec rm -rf {} +
          cp -R "${GITHUB_WORKSPACE}/docs/." .
          touch .nojekyll

          git add -A
          git commit --allow-empty -m "[BOT] Build Storybook"
          git push origin gh-pages --force
